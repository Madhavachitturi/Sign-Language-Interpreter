<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Language Interpreter</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="background-elements">
        <div class="blob blob1"></div>
        <div class="blob blob2"></div>
        <div class="blob blob3"></div>
    </div>

    <main class="container">
        <header>
            <h1>Sign Language Interpreter <span class="badge">AI</span></h1>
            <p>Real-time ASL detection powered by MediaPipe and Random Forest</p>
        </header>

        <section class="glass-panel main-interface">
            <div class="video-container">
                <video id="videoElement" autoplay muted playsinline></video>
                <canvas id="captureCanvas" hidden></canvas>
            </div>
            
            <div class="controls-panel">
                <div class="status-indicator">
                    <div class="status-dot" id="cameraStatusDot"></div>
                    <span id="cameraStatusText">Camera starting</span>
                </div>
                <div class="detection-info">
                    <h3>Current Translation</h3>
                    <div class="glow-box">
                        <span id="predictedChar">Ready...</span>
                    </div>
                </div>
                <div class="sentence-info">
                    <h3>Sentence</h3>
                    <div class="sentence-box" id="sentenceText">Start signing...</div>
                    <div class="sentence-actions">
                        <button type="button" data-action="/sentence/space">Space</button>
                        <button type="button" data-action="/sentence/backspace">Backspace</button>
                        <button type="button" data-action="/sentence/clear">Clear</button>
                    </div>
                </div>
            </div>
        </section>
        
        <footer>
            <p>Built with <span class="heart">&hearts;</span> using Flask</p>
        </footer>
    </main>

    <script>
        const videoElement = document.getElementById('videoElement');
        const captureCanvas = document.getElementById('captureCanvas');
        const captureContext = captureCanvas.getContext('2d');
        const charDisplay = document.getElementById('predictedChar');
        const sentenceDisplay = document.getElementById('sentenceText');
        const cameraStatusDot = document.getElementById('cameraStatusDot');
        const cameraStatusText = document.getElementById('cameraStatusText');
        let isPredicting = false;

        function updateCameraStatus(status, message) {
            cameraStatusDot.classList.toggle('online', status === 'online');
            cameraStatusDot.classList.toggle('offline', status !== 'online');
            cameraStatusText.textContent = message || 'Camera unavailable';
        }

        function applyPrediction(data) {
            updateCameraStatus(data.camera_status, data.camera_message);
            if (data.character) {
                charDisplay.textContent = data.character;
                charDisplay.classList.add('pop');
                setTimeout(() => charDisplay.classList.remove('pop'), 200);
            } else {
                charDisplay.textContent = '-';
            }
            sentenceDisplay.textContent = data.sentence || 'Start signing...';
        }

        function sendFrameForPrediction() {
            if (isPredicting || videoElement.readyState < 2) {
                return;
            }

            isPredicting = true;
            captureCanvas.width = videoElement.videoWidth;
            captureCanvas.height = videoElement.videoHeight;
            captureContext.drawImage(videoElement, 0, 0, captureCanvas.width, captureCanvas.height);

            captureCanvas.toBlob((blob) => {
                if (!blob) {
                    isPredicting = false;
                    return;
                }

                const formData = new FormData();
                formData.append('frame', blob, 'frame.jpg');

                fetch('/predict_frame', {
                    method: 'POST',
                    body: formData
                })
                    .then(response => response.json())
                    .then(data => {
                        if (data.error) {
                            updateCameraStatus('offline', data.error);
                            return;
                        }
                        applyPrediction(data);
                    })
                    .catch(() => updateCameraStatus('offline', 'Backend unavailable'))
                    .finally(() => {
                        isPredicting = false;
                    });
            }, 'image/jpeg', 0.78);
        }

        async function startBrowserCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        width: { ideal: 1280 },
                        height: { ideal: 720 },
                        facingMode: 'user'
                    },
                    audio: false
                });
                videoElement.srcObject = stream;
                updateCameraStatus('online', 'Browser camera active');
                setInterval(sendFrameForPrediction, 450);
            } catch (error) {
                updateCameraStatus('offline', 'Allow camera access in the browser');
                charDisplay.textContent = 'Camera blocked';
                console.error('Camera access error:', error);
            }
        }

        startBrowserCamera();

        document.querySelectorAll('[data-action]').forEach((button) => {
            button.addEventListener('click', () => {
                fetch(button.dataset.action, { method: 'POST' })
                    .then(response => response.json())
                    .then(data => {
                        document.getElementById('sentenceText').textContent = data.sentence || 'Start signing...';
                    })
                    .catch(error => console.error('Error updating sentence:', error));
            });
        });
    </script>
</body>
</html>
