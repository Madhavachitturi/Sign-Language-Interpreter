<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Language Interpreter</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="background-elements">
        <div class="blob blob1"></div>
        <div class="blob blob2"></div>
        <div class="blob blob3"></div>
    </div>

    <main class="container">
        <header>
            <h1>Sign Language Interpreter <span class="badge">AI</span></h1>
            <p>Real-time ASL detection powered by MediaPipe and Random Forest</p>
        </header>

        <section class="glass-panel main-interface">
            <div class="video-container">
                <img src="{{ url_for('video_feed') }}" alt="Live Camera Feed" id="videoElement">
            </div>
            
            <div class="controls-panel">
                <div class="status-indicator">
                    <div class="status-dot online"></div>
                    <span>Camera Active</span>
                </div>
                <div class="detection-info">
                    <h3>Current Translation</h3>
                    <div class="glow-box">
                        <span id="predictedChar">Ready...</span>
                    </div>
                </div>
            </div>
        </section>
        
        <footer>
            <p>Built with <span class="heart">&hearts;</span> using Flask</p>
        </footer>
    </main>

    <script>
        // Use Server-Sent Events or WebSockets to get current prediction text directly?
        // Actually, the prediction is burned into the camera frame. 
        // We can just rely on the video stream, but adding the text below is nice.
        // It's part of the image directly, so we just say "Ready..." or could fetch a prediction endpoint.
        // Let's create a simple polling mechanism to get the recognized character.
        setInterval(() => {
            fetch('/current_prediction')
                .then(response => response.json())
                .then(data => {
                    const charDisplay = document.getElementById('predictedChar');
                    if (data.character) {
                        charDisplay.textContent = data.character;
                        charDisplay.classList.add('pop');
                        setTimeout(() => charDisplay.classList.remove('pop'), 200);
                    } else {
                        charDisplay.textContent = '-';
                    }
                })
                .catch(error => console.error('Error fetching prediction:', error));
        }, 300);
    </script>
</body>
</html>
